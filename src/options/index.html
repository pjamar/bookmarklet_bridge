<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bookmarklet Bridge</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #e9e7e2;
        --bg-top: #f6f4ef;
        --glow: rgba(255,255,255,0.58);
        --paper: #f8f7f4;
        --paper-strong: #fcfbf8;

        --paper-faint: rgba(248,247,244,0.64);
        --ink: #22211f;
        --muted: #706b63;
        --line: #c8c1b7;
        --accent: #2e6664;
        --accent-strong: #234d4c;
        --accent-soft: #dcebea;
        --accent-soft-border: #a9c4c2;
        --warn-soft: #efe1d7;
        --warn-border: #cda98d;
        --rose-soft: #efe0e3;
        --rose-border: #d5b1ba;
        --gold-soft: #efe8d2;
        --gold-border: #ccb985;
        --mint-soft: #ddebe6;
        --mint-border: #aac3b9;
        --sky-soft: #dfe8f1;
        --sky-border: #adc0d2;
        --lilac-soft: #e7e2eb;
        --lilac-border: #bdb1c8;
        --sage-soft: #e3eadf;
        --sage-border: #b1c0ab;
        --primary-soft: #d7e6e4;
        --primary-border: #89aead;
        --primary-ink: #163838;
        --success-bg: #e4efeb;
        --success-border: #acc5bb;
        --success-ink: #1f4f45;
        --error-bg: #f2e4dc;
        --error-border: #d5afa0;
        --error-ink: #8a4930;
        --link: #2e6664;
        --code-ink: #23211e;
        --code-comment: #7b756e;
        --code-keyword: #9a5734;
        --code-number: #8c6a2a;
        --code-string: #2d6a66;
        --code-function: #3b5f8e;
        --code-property: #74608d;
        --code-punctuation: #6f6962;
        --code-built-in: #356a4d;
        --code-deletion: #9b4f44;
        --code-meta: #705f4d;
      }
      :root[data-theme-mode="light"] {
        color-scheme: light;
      }
      :root[data-theme-mode="dark"] {
        color-scheme: dark;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #1a1f24;
          --bg-top: #253038;
          --glow: rgba(117,153,166,0.12);
          --paper: #20272d;
          --paper-strong: #263038;

          --accent: #79a7a5;

          --accent-soft-border: #456066;
          --warn-soft: #3a2f2d;
          --warn-border: #6e5550;
          --rose-soft: #3a2d35;

          --mint-soft: #23332f;

          --sky-soft: #22303d;
          --sky-border: #48627b;
          --lilac-soft: #2f2c38;
          --lilac-border: #5d5970;
          --sage-soft: #2b332d;
          --sage-border: #5b6b5e;

          --primary-border: #557980;
          --primary-ink: #d7eceb;
          --success-bg: #21332f;
          --success-border: #46655f;
          --success-ink: #b7ddd3;
          --error-bg: #372926;
          --error-border: #6b4b43;
          --error-ink: #ebc0b3;
          --link: #8ab8b6;
          --code-ink: #e7e2db;
          --code-comment: #8e9a96;
          --code-keyword: #d3976d;
          --code-number: #d0b26b;
          --code-string: #89c3bb;
          --code-function: #93b5dd;
          --code-property: #b4a0d1;
          --code-punctuation: #9b958d;
          --code-built-in: #8dc09d;
          --code-deletion: #d6887a;
          --code-meta: #b79c7f;
        }
      }

        --bg: #e9e7e2;

        --accent: #2e6664;
        --accent-strong: #234d4c;
        --accent-soft: #dcebea;
        --accent-soft-border: #a9c4c2;
        --warn-soft: #efe1d7;

      }
      :root[data-theme-mode="dark"] {
        --bg: #1a1f24;

        --line: #3a474f;
        --accent: #79a7a5;
        --accent-strong: #9dc2c1;
        --accent-soft: #22363a;
        --accent-soft-border: #456066;
        --warn-soft: #3a2f2d;
        --warn-border: #6e5550;
        --rose-soft: #3a2d35;
        --rose-border: #6d5463;
        --gold-soft: #3c3528;
        --gold-border: #6f6244;
        --mint-soft: #23332f;
        --mint-border: #49645f;
        --sky-soft: #22303d;
        --sky-border: #48627b;
        --lilac-soft: #2f2c38;
        --lilac-border: #5d5970;
        --sage-soft: #2b332d;
        --sage-border: #5b6b5e;
        --primary-soft: #203337;
        --primary-border: #557980;
        --primary-ink: #d7eceb;
        --success-bg: #21332f;
        --success-border: #46655f;
        --success-ink: #b7ddd3;
        --error-bg: #372926;
        --error-border: #6b4b43;
        --error-ink: #ebc0b3;
        --link: #8ab8b6;
        --code-ink: #e7e2db;
        --code-comment: #8e9a96;
        --code-keyword: #d3976d;
        --code-number: #d0b26b;
        --code-string: #89c3bb;
        --code-function: #93b5dd;
        --code-property: #b4a0d1;
        --code-punctuation: #9b958d;
        --code-built-in: #8dc09d;
        --code-deletion: #d6887a;
        --code-meta: #b79c7f;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background:
          radial-gradient(circle at top left, var(--glow), transparent 30%),
          linear-gradient(180deg, var(--bg-top) 0%, var(--bg) 100%);
        color: var(--ink);
        font: 14px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace;
      }
      .app {
        display: grid;
        grid-template-columns: 280px 1fr;
        min-height: 100vh;
      }
      aside {
        border-right: 1px solid var(--line);
        padding: 24px;
      }
      main {
        padding: 24px;
      }
      h1, h2, h3 { margin-top: 0; }
      .title {
        font-size: 24px;
        margin-bottom: 6px;
      }
      .muted { color: var(--muted); }
      nav button, .button {
        width: 100%;
        margin: 0 0 10px;
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: var(--paper-soft);
        color: var(--ink);
        cursor: pointer;
        text-align: left;
        text-decoration: none;
        font: inherit;
        position: relative;
        z-index: 1;
        pointer-events: auto;
        appearance: none;
      }
      nav button:hover { border-color: var(--accent); background: var(--paper-strong); }
      nav button.active { border-color: var(--accent); background: var(--accent-soft); }
      nav button.nav-sand {
        background: var(--gold-soft);
        border-color: var(--gold-border);
      }
      nav button.nav-sand:hover,
      nav button.nav-sand.active {
        background: color-mix(in srgb, var(--gold-soft) 78%, var(--paper-strong));
        border-color: var(--gold-border);
      }
      nav button.nav-mint {
        background: var(--mint-soft);
        border-color: var(--mint-border);
      }
      nav button.nav-mint:hover,
      nav button.nav-mint.active {
        background: color-mix(in srgb, var(--mint-soft) 78%, var(--paper-strong));
        border-color: var(--mint-border);
      }
      nav button.nav-rose {
        background: var(--rose-soft);
        border-color: var(--rose-border);
      }
      nav button.nav-rose:hover,
      nav button.nav-rose.active {
        background: color-mix(in srgb, var(--rose-soft) 78%, var(--paper-strong));
        border-color: var(--rose-border);
      }
      nav button.nav-sky {
        background: var(--sky-soft);
        border-color: var(--sky-border);
      }
      nav button.nav-sky:hover,
      nav button.nav-sky.active {
        background: color-mix(in srgb, var(--sky-soft) 78%, var(--paper-strong));
        border-color: var(--sky-border);
      }
      nav button.nav-gold {
        background: var(--gold-soft);
        border-color: var(--gold-border);
      }
      nav button.nav-gold:hover,
      nav button.nav-gold.active {
        background: color-mix(in srgb, var(--gold-soft) 78%, var(--paper-strong));
        border-color: var(--gold-border);
      }
      .panel {
        background: var(--paper-soft);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 18px;
        margin-bottom: 18px;
      }
      textarea, input, select {
        width: 100%;
        padding: 10px;
        border-radius: 10px;
        border: 1px solid var(--line);
        background: var(--paper-strong);
        color: var(--ink);
        font: inherit;
      }
      textarea { min-height: 120px; }
      textarea.editor {
        min-height: 360px;
        resize: vertical;
        tab-size: 2;
      }
      .grid {
        display: grid;
        gap: 14px;
      }
      .grid.two {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .ide-layout {
        grid-template-columns: minmax(0, 1.4fr);
      }
      .row {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      .doc-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 14px;
      }
      .doc-card {
        padding: 14px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: var(--paper-faint);
      }
      .doc-card p {
        margin-top: 8px;
      }
      .doc-signature {
        font-weight: 700;
        color: var(--accent);
      }
      .chip {
        display: inline-block;
        padding: 4px 8px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: var(--paper-strong);
        margin: 0 8px 8px 0;
      }
      .list-item {
        padding: 14px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: var(--paper-strong);
        margin-bottom: 10px;
      }
      .empty-state {
        background: var(--paper-faint);
      }
      pre {
        white-space: pre-wrap;
        overflow-wrap: anywhere;
        background: var(--paper-strong);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 12px;
      }
      code {
        font: inherit;
      }
      .markdown-body :is(h1, h2, h3) {
        margin: 0 0 10px;
      }
      .markdown-body p {
        margin: 0 0 10px;
      }
      .markdown-body ul {
        margin: 0 0 10px 18px;
        padding: 0;
      }
      .markdown-body blockquote {
        margin: 0 0 10px;
        padding-left: 12px;
        border-left: 3px solid var(--line);
        color: var(--muted);
      }
      .markdown-body pre {
        margin: 0 0 10px;
      }
      .markdown-body a {
        color: var(--link);
      }
      .button.inline {
        width: auto;
        padding-inline: 14px;
        margin: 0;
      }
      .pastel-mint {
        background: var(--mint-soft);
        border-color: var(--mint-border);
      }
      .pastel-mint:hover {
        background: color-mix(in srgb, var(--mint-soft) 80%, var(--paper-strong));
        border-color: var(--mint-border);
      }
      .pastel-sky {
        background: var(--sky-soft);
        border-color: var(--sky-border);
      }
      .pastel-sky:hover {
        background: color-mix(in srgb, var(--sky-soft) 80%, var(--paper-strong));
        border-color: var(--sky-border);
      }
      .pastel-peach {
        background: var(--warn-soft);
        border-color: var(--warn-border);
      }
      .pastel-peach:hover {
        background: color-mix(in srgb, var(--warn-soft) 80%, var(--paper-strong));
        border-color: var(--warn-border);
      }
      .pastel-lilac {
        background: var(--lilac-soft);
        border-color: var(--lilac-border);
      }
      .pastel-lilac:hover {
        background: color-mix(in srgb, var(--lilac-soft) 80%, var(--paper-strong));
        border-color: var(--lilac-border);
      }
      .pastel-sage {
        background: var(--sage-soft);
        border-color: var(--sage-border);
      }
      .pastel-sage:hover {
        background: color-mix(in srgb, var(--sage-soft) 80%, var(--paper-strong));
        border-color: var(--sage-border);
      }
      .pastel-primary {
        background: var(--primary-soft);
        border-color: var(--primary-border);
        color: var(--primary-ink);
        font-weight: 700;
      }
      .pastel-primary:hover {
        background: color-mix(in srgb, var(--primary-soft) 80%, var(--paper-strong));
        border-color: var(--primary-border);
      }
      .pastel-rose {
        background: var(--rose-soft);
        border-color: var(--rose-border);
      }
      .pastel-rose:hover {
        background: color-mix(in srgb, var(--rose-soft) 80%, var(--paper-strong));
        border-color: var(--rose-border);
      }
      .pastel-gold {
        background: var(--gold-soft);
        border-color: var(--gold-border);
      }
      .pastel-gold:hover {
        background: color-mix(in srgb, var(--gold-soft) 80%, var(--paper-strong));
        border-color: var(--gold-border);
      }
      .pastel-blue {
        background: var(--sky-soft);
        border-color: var(--sky-border);
      }
      .pastel-blue:hover {
        background: color-mix(in srgb, var(--sky-soft) 80%, var(--paper-strong));
        border-color: var(--sky-border);
      }
      .status {
        padding: 10px 12px;
        border-radius: 12px;
        border: 1px solid var(--line);
      }
      .status.success {
        background: var(--success-bg);
        border-color: var(--success-border);
        color: var(--success-ink);
      }
      .status.error {
        background: var(--error-bg);
        border-color: var(--error-border);
        color: var(--error-ink);
      }
      .hljs {
        display: block;
        overflow-x: auto;
      }
      @media (max-width: 840px) {
        .app { grid-template-columns: 1fr; }
        aside { border-right: 0; border-bottom: 1px solid var(--line); }
        .grid.two { grid-template-columns: 1fr; }
        .doc-grid { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script src="./options.js"></script>
  </body>
  </html>
